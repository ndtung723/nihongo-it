server:
  port: 8088

spring:
  application:
    name: learning-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/NihongoIT}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      connection-timeout: 20000 # 20 seconds
      idle-timeout: 300000 # 5 minutes
      max-lifetime: 1200000 # 20 minutes
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVICE_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

# Ribbon configuration for load balancing
ribbon:
  eureka:
    enabled: true
  ConnectTimeout: 5000
  ReadTimeout: 5000
  MaxAutoRetries: 1
  MaxAutoRetriesNextServer: 1
  OkToRetryOnAllOperations: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    enabled: true
    path: /v3/api-docs

# JWT Configuration - Sử dụng cùng secret key với user-service để xác thực token
jwt:
  secret: ${JWT_SECRET}
  expiration: 7200000 # 2h, sync với user-service

# Cấu hình logging
logging:
  level:
    root: WARN
    com.example.learningservice: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN

  metrics:
    tags:
      application: \${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
