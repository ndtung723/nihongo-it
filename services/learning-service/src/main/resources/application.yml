spring:
  config:
    import: classpath:application-common.yml
  application:
    name: learning-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/NihongoIT}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      connection-timeout: 20000 # 20 seconds
      idle-timeout: 300000 # 5 minutes
      max-lifetime: 1200000 # 20 minutes
      leak-detection-threshold: 60000 # 60 seconds
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=600s

server:
  port: 8088

app:
  fsrs:
    request-retention: 0.9
    maximum-interval: 36500.0
    weights:
      - 0.4
      - 0.6
      - 2.4
      - 5.8
      - 4.93
      - 0.94
      - 0.86
      - 0.01
      - 1.49
      - 0.14
      - 0.94
      - 2.18
      - 0.05
      - 0.34
      - 1.26
      - 0.29
      - 2.61

# JWT Configuration - Sử dụng cùng secret key với user-service để xác thực token
jwt:
  secret: ${JWT_SECRET}
  expiration: 7200000 # 2h, sync với user-service

logging:
  level:
    root: WARN
    com.example.learningservice: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
