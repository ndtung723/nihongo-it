spring:
  config:
    import: classpath:application-common.yml
  application:
    name: user-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/NihongoIT}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000 # 20 seconds
      idle-timeout: 300000 # 5 minutes
      max-lifetime: 1200000 # 20 minutes
      leak-detection-threshold: 60000 # 60 seconds
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email,profile
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: true

server:
  port: 8086

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  secret-previous: ${JWT_SECRET_PREVIOUS:}  # set during key rotation; empty = disabled
  expiration: 7200000 # 2 hours
  refresh-expiration: 1209600000 # 14 days

# Feign client configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: full

app:
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:5173}
  cookie:
    secure: ${COOKIE_SECURE:false}  # set true in production (HTTPS)

logging:
  level:
    root: WARN
    com.example.userservice: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
