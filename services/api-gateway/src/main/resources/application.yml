server:
  port: 8080

spring:
  application:
    name: api-gateway
  threads:
    virtual:
      enabled: true
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # Đảm bảo các headers nhạy cảm được chuyển tiếp - không loại bỏ header Authorization
      sensitive-headers:
      # Loại bỏ cấu hình globalcors vì đã có corsWebFilter trong SecurityConfig
      routes:
        # User Service (Auth Service) Route
        - id: user-service
          uri: ${USER_SERVICE_URL:lb://user-service}
          predicates:
            - Path=/api/v1/user/**
          filters:
            - StripPrefix=0

        - id: learning-service
          uri: ${LEARNING_SERVICE_URL:lb://learning-service}
          predicates:
            - Path=/api/v1/learning/**
          filters:
            - StripPrefix=0

        # AI Service Route
        - id: ai-service
          uri: ${AI_SERVICE_URL:lb://ai-service}
          predicates:
            - Path=/api/v1/ai/**
          filters:
            - StripPrefix=0

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:lb://notification-service}
          predicates:
            - Path=/api/v1/notify/**
          filters:
            - StripPrefix=0

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVICE_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    gateway:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /api-docs
  api-docs:
    enabled: true
    path: /v3/api-docs

jwt:
  secret: ${JWT_SECRET}
  secret-previous: ${JWT_SECRET_PREVIOUS:}  # set during key rotation; empty = disabled

app:
  cors:
    # 3000 = frontend-user (Next.js), 3002 = frontend-admin (Next.js host port)
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3002}

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.web: INFO
    com.example.apigateway: INFO
