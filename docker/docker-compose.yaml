services:
  # Database Services
  postgres:
    image: postgres:16
    container_name: nihongoit-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nihongo_network
    restart: no

  python:
    build:
      context: ../python
      dockerfile: Dockerfile
    image: nihongoit/python:latest
    container_name: nihongoit-python
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEBUG_MODE: "false"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      INTERNAL_ONLY: "true"
    ports:
      - "8000:8000"
    networks:
      - nihongo_network
    restart: no

  # Service Discovery
  eureka-server:
    build:
      context: ../services
      dockerfile: eureka-server/Dockerfile
    image: nihongoit/eureka-server:latest
    container_name: nihongoit-eureka-server
    ports:
      - "8761:8761"
    networks:
      - nihongo_network
    restart: no

  # API Gateway
  api-gateway:
    build:
      context: ../services
      dockerfile: api-gateway/Dockerfile
    image: nihongoit/api-gateway:latest
    container_name: nihongoit-api-gateway
    environment:
      EUREKA_SERVICE_URL: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    networks:
      - nihongo_network
    restart: no

  # User Service (Auth Service)
  user-service:
    build:
      context: ../services
      dockerfile: user-service/Dockerfile
    image: nihongoit/user-service:latest
    container_name: nihongoit-user-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_SERVICE_URL: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL}
    ports:
      - "8086:8086"
    depends_on:
      - postgres
      - eureka-server
    networks:
      - nihongo_network
    restart: no

  # AI Service
  ai-service:
    build:
      context: ../services
      dockerfile: ai-service/Dockerfile
    image: nihongoit/ai-service:latest
    container_name: nihongoit-ai-service
    environment:
      EUREKA_SERVICE_URL: http://eureka-server:8761/eureka/
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PYTHON_SERVICE_URL: ${PYTHON_SERVICE_URL:-http://python:8000}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    ports:
      - "8087:8087"
    depends_on:
      - eureka-server
    networks:
      - nihongo_network
    restart: no

  # Notification Service
  notification-service:
    build:
      context: ../services
      dockerfile: notification/Dockerfile
    image: nihongoit/notification-service:latest
    container_name: nihongoit-notification-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_SERVICE_URL: http://eureka-server:8761/eureka/
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL}
    ports:
      - "8089:8089"
    depends_on:
      - postgres
      - eureka-server
    networks:
      - nihongo_network
    restart: no

  # Learning Service
  learning-service:
    build:
      context: ../services
      dockerfile: learning-service/Dockerfile
    image: nihongoit/learning-service:latest
    container_name: nihongoit-learning-service
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_SERVICE_URL: http://eureka-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8088:8088"
    depends_on:
      - postgres
      - eureka-server
    networks:
      - nihongo_network
    restart: no

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: nihongoit-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - nihongo_network
    restart: no

  loki:
    image: grafana/loki:2.9.6
    container_name: nihongoit-loki
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./loki-config.yml:/etc/loki/config.yml
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - nihongo_network
    restart: no

  promtail:
    image: grafana/promtail:2.9.6
    container_name: nihongoit-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki
    networks:
      - nihongo_network
    restart: no

  grafana:
    image: grafana/grafana:10.4.2
    container_name: nihongoit-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - nihongo_network
    restart: no

  # Next.js user app (replaces Vue frontend after Phase 12.4 cutover)
  frontend-user:
    build:
      context: ../frontend-user
      dockerfile: Dockerfile
    image: nihongoit/frontend-user:latest
    container_name: nihongoit-frontend-user
    environment:
      # Browser-facing URL — must be reachable from the user's browser
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - nihongo_network
    restart: no

  # Next.js admin app — host port 3002 (grafana already takes 3001)
  frontend-admin:
    build:
      context: ../frontend-admin
      dockerfile: Dockerfile
    image: nihongoit/frontend-admin:latest
    container_name: nihongoit-frontend-admin
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3002:3001"
    depends_on:
      - api-gateway
    networks:
      - nihongo_network
    restart: no

networks:
  nihongo_network:
    driver: bridge

volumes:
  postgres_data:
  grafana_data:
  loki_data:
