name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend-user/**'
      - 'frontend-admin/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend-user/**'
      - 'frontend-admin/**'
      - '.github/workflows/frontend.yml'

jobs:
  ci:
    name: ${{ matrix.app }} (lint, type-check, test, build)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app: [frontend-user, frontend-admin]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.app }}

      - name: Lint
        run: npm run lint
        working-directory: ${{ matrix.app }}

      - name: Type check
        run: npm run type-check
        working-directory: ${{ matrix.app }}

      - name: Unit tests
        run: npm test
        working-directory: ${{ matrix.app }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.app }}
