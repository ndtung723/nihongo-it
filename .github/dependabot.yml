version: 2

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "ci"]

  # Frontend user app (Next.js 16 + React 19)
  - package-ecosystem: "npm"
    directory: "/frontend-user"
    schedule:
      interval: "weekly"
    groups:
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
      nextjs-ecosystem:
        patterns: ["next", "react", "react-dom", "@types/react*"]
      shadcn-radix:
        patterns: ["@radix-ui/*", "radix-ui", "shadcn", "lucide-react", "tw-animate-css"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*", "prettier-plugin-tailwindcss"]
      testing:
        patterns: ["vitest", "@vitest/*", "@vitejs/*", "@testing-library/*", "jsdom"]
    labels: ["dependencies", "frontend-user"]

  # Frontend admin app (Next.js 16 + React 19)
  - package-ecosystem: "npm"
    directory: "/frontend-admin"
    schedule:
      interval: "weekly"
    groups:
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
      nextjs-ecosystem:
        patterns: ["next", "react", "react-dom", "@types/react*"]
      shadcn-radix:
        patterns: ["@radix-ui/*", "radix-ui", "shadcn", "lucide-react", "tw-animate-css"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*", "prettier-plugin-tailwindcss"]
      testing:
        patterns: ["vitest", "@vitest/*", "@vitejs/*", "@testing-library/*", "jsdom"]
    labels: ["dependencies", "frontend-admin"]

  # Python
  - package-ecosystem: "pip"
    directory: "/python"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "python"]

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/services/user-service"
    schedule:
      interval: "monthly"
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/services/learning-service"
    schedule:
      interval: "monthly"
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/services/api-gateway"
    schedule:
      interval: "monthly"
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/frontend-user"
    schedule:
      interval: "monthly"
    labels: ["dependencies", "docker"]

  - package-ecosystem: "docker"
    directory: "/frontend-admin"
    schedule:
      interval: "monthly"
    labels: ["dependencies", "docker"]
