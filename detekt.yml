build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 8
  CyclomaticComplexMethod:
    threshold: 15
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 15

naming:
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'  # Allow backtick test names
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][_A-Z0-9]*'

style:
  MagicNumber:
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
      - '5'
      - '5.0'
      - '10'
      - '100'
      - '1000'
    ignoreAnnotated:
      - 'Value'
      - 'Column'
  WildcardImport:
    active: false
  MaxLineLength:
    maxLineLength: 140
  ReturnCount:
    max: 3
  VarCouldBeVal:
    ignoreAnnotated:
      - 'Value'
      - 'Autowired'

potential-bugs:
  UnsafeCallOnNullableType:
    active: true

exceptions:
  TooGenericExceptionCaught:
    active: false  # Spring services intentionally catch Exception

# ktlint handles formatting separately
