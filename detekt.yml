config:
  validation: false
  warningsAsErrors: false

naming:
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][_A-Z0-9]*'

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  MaxLineLength:
    maxLineLength: 140
  ReturnCount:
    max: 8
  ForbiddenVoid:
    active: false
  VarCouldBeVal:
    ignoreAnnotated:
      - 'Value'
      - 'Autowired'
  UnusedParameter:
    active: false
  ThrowsCount:
    active: false

performance:
  SpreadOperator:
    active: false

potential-bugs:
  UnsafeCallOnNullableType:
    active: true

complexity:
  TooManyFunctions:
    active: false
  LongMethod:
    active: false
  ComplexCondition:
    active: false
  ComplexMethod:
    active: false
  CyclomaticComplexMethod:
    active: false
  LongParameterList:
    active: false
  NestedBlockDepth:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: false
  SwallowedException:
    active: false
  ThrowsCount:
    active: false
  TooGenericExceptionThrown:
    active: false

# ktlint handles formatting separately
